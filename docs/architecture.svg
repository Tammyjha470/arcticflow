<svg viewBox="0 0 1400 850" width="1400" height="850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="1400" height="850" fill="#0f1117"/>

  <!-- Title -->
  <text x="700" y="52" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="bold">ArcticFlow - Enterprise Data Engineering Platform</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#888888"/>
    </marker>
  </defs>

  <!-- ── SOURCE ── -->
  <rect x="40" y="90" width="210" height="110" rx="12" fill="#1e2a3a" stroke="#4a90d9" stroke-width="2"/>
  <text x="145" y="120" text-anchor="middle" fill="#4a90d9" font-size="14" font-weight="bold">SOURCE</text>
  <text x="145" y="143" text-anchor="middle" fill="#ffffff" font-size="13">Azure SQL</text>
  <text x="145" y="163" text-anchor="middle" fill="#aaaaaa" font-size="11">Staging Database</text>
  <text x="145" y="183" text-anchor="middle" fill="#aaaaaa" font-size="11">Standard S0 Tier</text>

  <!-- Arrow Source to ADF -->
  <line x1="250" y1="145" x2="330" y2="145" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── ORCHESTRATION ── -->
  <rect x="330" y="90" width="210" height="110" rx="12" fill="#1e2a3a" stroke="#f5a623" stroke-width="2"/>
  <text x="435" y="120" text-anchor="middle" fill="#f5a623" font-size="14" font-weight="bold">ORCHESTRATION</text>
  <text x="435" y="143" text-anchor="middle" fill="#ffffff" font-size="13">Azure Data Factory</text>
  <text x="435" y="163" text-anchor="middle" fill="#aaaaaa" font-size="11">Pipelines and Triggers</text>
  <text x="435" y="183" text-anchor="middle" fill="#aaaaaa" font-size="11">Managed Identity</text>

  <!-- Arrow ADF to Bronze -->
  <line x1="540" y1="145" x2="620" y2="235" stroke="#cd7f32" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── BRONZE ── -->
  <rect x="620" y="235" width="220" height="100" rx="12" fill="#1e2a3a" stroke="#cd7f32" stroke-width="2"/>
  <text x="730" y="265" text-anchor="middle" fill="#cd7f32" font-size="14" font-weight="bold">BRONZE LAYER</text>
  <text x="730" y="288" text-anchor="middle" fill="#ffffff" font-size="13">ADLS Gen2</text>
  <text x="730" y="308" text-anchor="middle" fill="#aaaaaa" font-size="11">Raw ingested data</text>

  <!-- Arrow Bronze to Silver -->
  <line x1="730" y1="335" x2="730" y2="380" stroke="#c0c0c0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── SILVER ── -->
  <rect x="620" y="380" width="220" height="100" rx="12" fill="#1e2a3a" stroke="#c0c0c0" stroke-width="2"/>
  <text x="730" y="410" text-anchor="middle" fill="#c0c0c0" font-size="14" font-weight="bold">SILVER LAYER</text>
  <text x="730" y="433" text-anchor="middle" fill="#ffffff" font-size="13">ADLS Gen2</text>
  <text x="730" y="453" text-anchor="middle" fill="#aaaaaa" font-size="11">Cleaned and typed</text>

  <!-- Arrow Silver to Gold -->
  <line x1="730" y1="480" x2="730" y2="525" stroke="#ffd700" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── GOLD ── -->
  <rect x="620" y="525" width="220" height="100" rx="12" fill="#1e2a3a" stroke="#ffd700" stroke-width="2"/>
  <text x="730" y="555" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold">GOLD LAYER</text>
  <text x="730" y="578" text-anchor="middle" fill="#ffffff" font-size="13">ADLS Gen2</text>
  <text x="730" y="598" text-anchor="middle" fill="#aaaaaa" font-size="11">Business-ready aggregates</text>

  <!-- Arrow Gold to Snowflake -->
  <line x1="840" y1="575" x2="930" y2="500" stroke="#29b5e8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── SNOWFLAKE ── -->
  <rect x="930" y="350" width="220" height="290" rx="12" fill="#1e2a3a" stroke="#29b5e8" stroke-width="2"/>
  <text x="1040" y="385" text-anchor="middle" fill="#29b5e8" font-size="14" font-weight="bold">SNOWFLAKE</text>
  <line x1="950" y1="398" x2="1130" y2="398" stroke="#29b5e8" stroke-width="0.8" opacity="0.4"/>
  <text x="1040" y="420" text-anchor="middle" fill="#ffffff" font-size="13">RAW_DB</text>
  <text x="1040" y="443" text-anchor="middle" fill="#ffffff" font-size="13">ANALYTICS_DB</text>
  <text x="1040" y="466" text-anchor="middle" fill="#ffffff" font-size="13">REPORTING_DB</text>
  <line x1="950" y1="480" x2="1130" y2="480" stroke="#29b5e8" stroke-width="0.8" opacity="0.4"/>
  <text x="1040" y="503" text-anchor="middle" fill="#aaaaaa" font-size="12">LOADER role</text>
  <text x="1040" y="524" text-anchor="middle" fill="#aaaaaa" font-size="12">TRANSFORMER role</text>
  <text x="1040" y="545" text-anchor="middle" fill="#aaaaaa" font-size="12">ANALYST role</text>
  <line x1="950" y1="558" x2="1130" y2="558" stroke="#29b5e8" stroke-width="0.8" opacity="0.4"/>
  <text x="1040" y="580" text-anchor="middle" fill="#aaaaaa" font-size="12">ARCTICFLOW_WH</text>
  <text x="1040" y="600" text-anchor="middle" fill="#aaaaaa" font-size="11">RSA Key Auth</text>
  <text x="1040" y="620" text-anchor="middle" fill="#aaaaaa" font-size="11">External Stage on Gold</text>

  <!-- ── SECURITY ── -->
  <rect x="40" y="240" width="210" height="150" rx="12" fill="#1e2a3a" stroke="#e74c3c" stroke-width="2"/>
  <text x="145" y="270" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">SECURITY</text>
  <text x="145" y="293" text-anchor="middle" fill="#ffffff" font-size="13">Azure Key Vault</text>
  <text x="145" y="315" text-anchor="middle" fill="#aaaaaa" font-size="11">Secrets and Keys</text>
  <text x="145" y="335" text-anchor="middle" fill="#aaaaaa" font-size="11">Managed Identities</text>
  <text x="145" y="355" text-anchor="middle" fill="#aaaaaa" font-size="11">RBAC Assignments</text>
  <text x="145" y="375" text-anchor="middle" fill="#aaaaaa" font-size="11">Network ACL</text>

  <!-- ── NETWORKING ── -->
  <rect x="40" y="430" width="210" height="120" rx="12" fill="#1e2a3a" stroke="#9b59b6" stroke-width="2"/>
  <text x="145" y="460" text-anchor="middle" fill="#9b59b6" font-size="14" font-weight="bold">NETWORKING</text>
  <text x="145" y="483" text-anchor="middle" fill="#ffffff" font-size="13">VNet and Subnets</text>
  <text x="145" y="503" text-anchor="middle" fill="#aaaaaa" font-size="11">Private Endpoints</text>
  <text x="145" y="523" text-anchor="middle" fill="#aaaaaa" font-size="11">NSG Rules</text>
  <text x="145" y="543" text-anchor="middle" fill="#aaaaaa" font-size="11">Service Endpoints</text>

  <!-- ── MONITORING ── -->
  <rect x="40" y="590" width="210" height="120" rx="12" fill="#1e2a3a" stroke="#2ecc71" stroke-width="2"/>
  <text x="145" y="620" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">MONITORING</text>
  <text x="145" y="643" text-anchor="middle" fill="#ffffff" font-size="13">Log Analytics Workspace</text>
  <text x="145" y="663" text-anchor="middle" fill="#aaaaaa" font-size="11">Diagnostic Settings</text>
  <text x="145" y="683" text-anchor="middle" fill="#aaaaaa" font-size="11">Metric Alerts</text>
  <text x="145" y="703" text-anchor="middle" fill="#aaaaaa" font-size="11">30-day Retention</text>

  <!-- ── IaC Label ── -->
  <rect x="930" y="90" width="420" height="90" rx="12" fill="#1e2a3a" stroke="#7b42bc" stroke-width="2"/>
  <text x="1140" y="125" text-anchor="middle" fill="#7b42bc" font-size="14" font-weight="bold">INFRASTRUCTURE AS CODE</text>
  <text x="1140" y="150" text-anchor="middle" fill="#ffffff" font-size="13">100% Terraform - zero manual clicks</text>
  <text x="1140" y="168" text-anchor="middle" fill="#aaaaaa" font-size="11">Azure + Snowflake providers</text>

  <!-- Footer -->
  <text x="700" y="830" text-anchor="middle" fill="#555555" font-size="11">Azure Pay-As-You-Go + Snowflake - Terraform Automated</text>

</svg>
